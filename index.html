<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🦉 Listen & Choose!</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:#1a1a2e;
  display:flex;flex-direction:column;align-items:center;
  padding:12px 12px 50px;
}

/* ─── FONDO ANIMADO ──────────────────────────────── */
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,#16213e 0%,#0f3460 60%,#533483 100%);
  overflow:hidden;}
.star-bg{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,2s) ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.15;transform:scale(1)}100%{opacity:.9;transform:scale(1.4)}}

/* ─── CONTENEDOR ─────────────────────────────────── */
.wrap{position:relative;z-index:1;width:100%;max-width:520px;
  display:flex;flex-direction:column;align-items:center;gap:10px;}

/* ─── TÍTULO ─────────────────────────────────────── */
.title{
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(2rem,8vw,2.8rem);color:#fff;
  text-shadow:0 0 20px #ff6fd8,0 4px 0 #7b2d8b;
  letter-spacing:2px;
  animation:titleFloat 3s ease-in-out infinite;
}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* ─── MASCOTA BÚHO (CSS puro) ────────────────────── */
.mascot-wrap{position:relative;width:130px;height:110px;margin:-2px 0;}

.bubble{
  position:absolute;top:-8px;left:118px;
  background:#fff;border-radius:16px;padding:7px 14px;
  font-size:.82rem;font-weight:900;color:#333;
  white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);
  opacity:0;transform:scale(.5) translateX(-10px);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:10;
}
.bubble::before{
  content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  border:6px solid transparent;border-right-color:#fff;
}
.bubble.show{opacity:1;transform:scale(1) translateX(0);}

.owl{position:relative;width:96px;height:100px;margin:0 auto;}
/* cuerpo */
.o-body{
  width:76px;height:84px;
  background:linear-gradient(155deg,#ff9a3c,#e65100);
  border-radius:38px 38px 32px 32px;
  position:absolute;left:10px;top:10px;
  box-shadow:0 6px 18px rgba(230,81,0,.5);
  animation:owlBob 2.2s ease-in-out infinite;
}
@keyframes owlBob{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
/* panza */
.o-belly{
  width:46px;height:52px;
  background:linear-gradient(155deg,#ffe0b2,#ffcc80);
  border-radius:23px 23px 20px 20px;
  position:absolute;left:50%;top:26px;transform:translateX(-50%);
}
/* alas */
.o-wing{
  width:26px;height:46px;
  background:linear-gradient(155deg,#bf360c,#8d1f00);
  position:absolute;top:16px;
}
.o-wing.l{left:-2px;border-radius:5px 14px 14px 14px;transform:rotate(-12deg);}
.o-wing.r{right:-2px;border-radius:14px 5px 14px 14px;transform:rotate(12deg);}
/* orejas */
.o-ears{position:absolute;top:6px;left:12px;width:72px;display:flex;justify-content:space-between;}
.o-ear{width:13px;height:18px;background:#bf360c;clip-path:polygon(50% 0%,100% 100%,0% 100%);}
/* cara */
.o-face{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:56px;text-align:center;}
.eyes-row{display:flex;justify-content:center;gap:8px;}
.o-eye{
  width:20px;height:20px;background:#fff;border-radius:50%;
  position:relative;box-shadow:0 0 0 3px #333;
  transition:transform .2s;
}
.o-eye::after{
  content:'';width:9px;height:9px;background:#1a1a2e;border-radius:50%;
  position:absolute;top:5px;left:4px;transition:all .2s;
}
.o-eye.happy{transform:scaleY(.7);}
.o-eye.happy::after{height:5px;top:7px;background:#1a1a2e;border-radius:50% 50% 0 0;}
.o-eye.sad{transform:scaleY(.45);}
.o-beak{
  width:16px;height:11px;background:#ff8f00;
  border-radius:0 0 50% 50%;
  margin:4px auto 0;
}
/* sonrojo */
.o-blush{
  width:13px;height:7px;background:rgba(255,80,80,.4);
  border-radius:50%;position:absolute;top:32px;
}
.o-blush.l{left:7px;} .o-blush.r{right:7px;}

/* reacciones de la mascota */
.mascot-wrap.correct .o-body{animation:owlJump .5s ease;}
.mascot-wrap.wrong   .o-body{animation:owlShake .4s ease;}
@keyframes owlJump{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-16px) rotate(-5deg)}70%{transform:translateY(-6px) rotate(3deg)}}
@keyframes owlShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}75%{transform:rotate(14deg)}}

/* ─── HUD ─────────────────────────────────────────── */
.hud{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.pill{
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.2);border-radius:50px;
  padding:6px 16px;font-weight:900;color:#fff;
  display:flex;align-items:center;gap:6px;
}
.pill .val{font-family:'Bubblegum Sans',cursive;font-size:1.25rem;
  color:#ffd700;text-shadow:0 0 8px #ffa500;}

/* ─── TRACK ESTRELLAS ────────────────────────────── */
.star-track{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:400px;}
.s-dot{font-size:1rem;opacity:.2;transition:all .35s cubic-bezier(.34,1.56,.64,1);}
.s-dot.done{opacity:1;transform:scale(1.35);filter:drop-shadow(0 0 5px #ffd700);}

/* ─── TARJETA JUEGO ──────────────────────────────── */
.card{
  background:rgba(255,255,255,.07);backdrop-filter:blur(16px);
  border:3px solid rgba(255,255,255,.16);border-radius:32px;
  padding:22px 18px 20px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18);
  text-align:center;
}
.cat-badge{
  display:inline-block;padding:5px 18px;border-radius:50px;
  font-weight:900;font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;
  background:linear-gradient(90deg,#ff6fd8,#a020a0);color:#fff;
  box-shadow:0 4px 14px rgba(160,32,160,.4);margin-bottom:14px;
}

/* ─── ZONA AUDIO ─────────────────────────────────── */
.listen-zone{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px;}
.btn-listen{
  width:96px;height:96px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#ff6fd8,#9b1faa);
  font-size:2.8rem;cursor:pointer;
  box-shadow:0 8px 0 #6a006a,0 0 28px rgba(255,111,216,.5);
  transition:transform .12s,box-shadow .12s;
  animation:listenPulse 2.5s ease-in-out infinite;
  position:relative;
}
@keyframes listenPulse{
  0%,100%{box-shadow:0 8px 0 #6a006a,0 0 18px rgba(255,111,216,.4)}
  50%{box-shadow:0 8px 0 #6a006a,0 0 40px rgba(255,111,216,.85),0 0 70px rgba(255,111,216,.25)}
}
.btn-listen:hover{transform:translateY(-4px) scale(1.06);animation:none;
  box-shadow:0 12px 0 #6a006a,0 0 50px rgba(255,111,216,.8);}
.btn-listen:active{transform:translateY(4px);box-shadow:0 4px 0 #6a006a;animation:none;}
.btn-listen.playing{animation:none;box-shadow:0 8px 0 #6a006a,0 0 55px #ff6fd8;}

/* ondas animadas */
.waves{display:flex;align-items:center;gap:4px;height:26px;}
.wbar{width:5px;border-radius:3px;background:linear-gradient(#ffd700,#ff8c00);
  opacity:0;transition:opacity .2s;
  animation:waveAnim var(--d,.6s) ease-in-out infinite alternate;}
.waves.active .wbar{opacity:1;}
@keyframes waveAnim{0%{height:5px}100%{height:var(--h,22px)}}

.btn-rep{
  background:rgba(255,215,0,.12);border:2px solid rgba(255,215,0,.35);
  border-radius:50px;padding:6px 18px;
  color:#ffd700;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;
  cursor:pointer;transition:all .15s;
}
.btn-rep:hover{background:rgba(255,215,0,.22);transform:scale(1.05);}

/* ─── OPCIONES ───────────────────────────────────── */
.instruction{font-size:.98rem;font-weight:900;color:rgba(255,255,255,.65);margin-bottom:14px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px;}

.opt{
  background:rgba(255,255,255,.1);
  border:3px solid rgba(255,255,255,.18);border-radius:22px;
  padding:15px 8px 12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:900;color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 6px 0 rgba(0,0,0,.3);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s,border-color .15s,background .15s;
  position:relative;overflow:hidden;
}
/* shimmer on hover */
.opt::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);
  pointer-events:none;
}
/* colores únicos por posición */
.opts .opt:nth-child(1):not(:disabled):hover{background:rgba(255,107,107,.35);border-color:#ff6b6b;}
.opts .opt:nth-child(2):not(:disabled):hover{background:rgba(78,205,196,.35);border-color:#4ecdc4;}
.opts .opt:nth-child(3):not(:disabled):hover{background:rgba(255,210,0,.25);border-color:#ffd200;}
.opts .opt:nth-child(4):not(:disabled):hover{background:rgba(161,140,209,.35);border-color:#a18cd1;}

.opt:hover:not(:disabled){transform:translateY(-7px) scale(1.05);
  box-shadow:0 13px 0 rgba(0,0,0,.3),0 0 22px rgba(255,255,255,.12);}
.opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.3);}
.opt:disabled{cursor:default;}

.opt-e{font-size:2.7rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));}
.opt-en{font-size:clamp(.88rem,3.2vw,1.1rem);font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.opt-es{font-size:.66rem;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;}

/* estados */
.opt.correct{
  background:linear-gradient(135deg,#00c851,#007e33)!important;
  border-color:#00ff66!important;
  box-shadow:0 6px 0 #004d1f,0 0 32px rgba(0,200,80,.65)!important;
  animation:correctPop .5s cubic-bezier(.34,1.56,.64,1);
}
.opt.wrong{
  background:linear-gradient(135deg,#ff3333,#bb0000)!important;
  border-color:#ff8888!important;
  box-shadow:0 6px 0 #770000,0 0 22px rgba(255,50,50,.5)!important;
  animation:wrongShake .4s ease;
}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.14)}70%{transform:scale(.96)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ─── FEEDBACK ───────────────────────────────────── */
.feedback{
  margin-top:14px;border-radius:20px;padding:11px 18px;
  font-size:1.08rem;font-weight:900;min-height:48px;
  opacity:0;transform:scale(.75) translateY(12px);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.feedback.show{opacity:1;transform:scale(1) translateY(0);}
.feedback.ok{background:linear-gradient(90deg,#00c851,#007e33);color:#fff;box-shadow:0 4px 20px rgba(0,200,80,.4);}
.feedback.ko{background:linear-gradient(90deg,#ff3333,#cc0000);color:#fff;box-shadow:0 4px 20px rgba(255,50,50,.4);}

/* ─── BTN SIGUIENTE ──────────────────────────────── */
.btn-next{
  display:none;margin-top:13px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  color:#1a1a2e;border:none;border-radius:50px;
  padding:13px 38px;
  font-family:'Bubblegum Sans',cursive;font-size:1.18rem;
  cursor:pointer;
  box-shadow:0 6px 0 #995000,0 0 18px rgba(255,200,0,.35);
  transition:transform .1s,box-shadow .1s;
}
.btn-next.show{display:inline-block;animation:wiggleNext .9s ease-in-out infinite;}
@keyframes wiggleNext{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.btn-next:hover{transform:translateY(-4px) scale(1.06)!important;animation:none;
  box-shadow:0 10px 0 #995000,0 0 30px rgba(255,200,0,.6);}
.btn-next:active{transform:translateY(3px)!important;box-shadow:0 3px 0 #995000;animation:none;}

/* ─── CONFETTI ───────────────────────────────────── */
.confetti-p{
  position:fixed;pointer-events:none;z-index:9999;
  animation:cfFall var(--d,1.6s) ease-in forwards;
}
@keyframes cfFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(105vh) rotate(800deg);opacity:0;}
}

/* ─── PANTALLA FINAL ─────────────────────────────── */
.end{
  display:none;
  background:rgba(255,255,255,.07);backdrop-filter:blur(16px);
  border:3px solid rgba(255,255,255,.16);border-radius:32px;
  padding:34px 22px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.end.show{display:block;animation:popIn .55s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{opacity:0;transform:scale(.4) rotate(-5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.end-trophy{font-size:5.5rem;display:block;margin-bottom:10px;animation:titleFloat 2s ease-in-out infinite;}
.end-title{font-family:'Bubblegum Sans',cursive;font-size:2rem;color:#ffd700;
  text-shadow:0 0 20px #ffa500;margin-bottom:8px;}
.end-stars{font-size:2.5rem;letter-spacing:8px;margin:8px 0;}
.end-sc{font-size:1.05rem;font-weight:900;color:rgba(255,255,255,.75);margin-bottom:22px;}
.btn-again{
  background:linear-gradient(135deg,#ff6fd8,#9b1faa);color:#fff;
  border:none;border-radius:50px;padding:15px 42px;
  font-family:'Bubblegum Sans',cursive;font-size:1.25rem;cursor:pointer;
  box-shadow:0 8px 0 #6a006a,0 0 28px rgba(255,111,216,.45);
  transition:transform .1s,box-shadow .1s;
}
.btn-again:hover{transform:translateY(-4px);box-shadow:0 12px 0 #6a006a,0 0 50px rgba(255,111,216,.7);}
.btn-again:active{transform:translateY(4px);box-shadow:0 4px 0 #6a006a;}

/* ─── RESPONSIVE ─────────────────────────────────── */
@media(max-width:380px){
  .opt-e{font-size:2.2rem;} .opt-en{font-size:.82rem;}
  .btn-listen{width:82px;height:82px;font-size:2.3rem;}
}
</style>
</head>
<body>

<div class="bg" id="bgEl"></div>

<div class="wrap">

  <h1 class="title">🦉 Listen &amp; Choose!</h1>

  <!-- Mascota -->
  <div class="mascot-wrap" id="mascot">
    <div class="bubble" id="bubble">Ready? Let's go! 🚀</div>
    <div class="owl">
      <div class="o-ears"><div class="o-ear"></div><div class="o-ear"></div></div>
      <div class="o-body">
        <div class="o-wing l"></div>
        <div class="o-wing r"></div>
        <div class="o-belly"></div>
        <div class="o-face">
          <div class="eyes-row">
            <div class="o-eye" id="eyeL"></div>
            <div class="o-eye" id="eyeR"></div>
          </div>
          <div class="o-beak"></div>
        </div>
        <div class="o-blush l"></div>
        <div class="o-blush r"></div>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="pill">⭐ <span class="val" id="scoreEl">0</span></div>
    <div class="pill">📋 <span class="val" id="roundEl">1</span><span style="color:rgba(255,255,255,.4);font-size:.85rem"><span id="totalEl">/10</span></span></div>
    <div class="pill">✅ <span class="val" id="hitsEl">0</span></div>
  </div>

  <!-- Track progreso -->
  <div class="star-track" id="starTrack"></div>

  <!-- Tarjeta principal -->
  <div class="card" id="gameCard">
    <div class="cat-badge" id="catBadge">Numbers 🔢</div>

    <div class="listen-zone">
      <button class="btn-listen" id="btnListen" title="Listen!">🔊</button>
      <div class="waves" id="wavesEl">
        <div class="wbar" style="--d:.5s;--h:7px"></div>
        <div class="wbar" style="--d:.7s;--h:19px"></div>
        <div class="wbar" style="--d:.4s;--h:24px"></div>
        <div class="wbar" style="--d:.6s;--h:13px"></div>
        <div class="wbar" style="--d:.5s;--h:21px"></div>
        <div class="wbar" style="--d:.8s;--h:10px"></div>
        <div class="wbar" style="--d:.45s;--h:17px"></div>
      </div>
      <button class="btn-rep" id="btnRep">🔁 Repeat</button>
    </div>

    <p class="instruction">Which word did you hear? 👇</p>
    <div class="opts" id="optsGrid"></div>
    <div class="feedback" id="feedbackEl"></div>
    <button class="btn-next" id="btnNext">Next ➡️</button>
  </div>

  <!-- Pantalla final -->
  <div class="end" id="endScreen">
    <span class="end-trophy" id="endTrophy">🏆</span>
    <h2 class="end-title" id="endTitle">Amazing!</h2>
    <div class="end-stars" id="endStars">⭐⭐⭐</div>
    <p class="end-sc" id="endSc">You got 27 / 27!</p>
    <button class="btn-again" id="btnAgain">🔄 Play Again!</button>
  </div>

</div>

<script>
/* ============================================================
   BANCO DE PREGUNTAS — currícula primaria argentina
   10 números · 10 colores · 7 objetos del aula = 27
============================================================ */
const Q = [
  // NÚMEROS
  {w:"one",   c:"Numbers 🔢", ok:{t:"one",   h:"1",  e:"1️⃣"}, d:[{t:"two",h:"2",e:"2️⃣"},{t:"five",h:"5",e:"5️⃣"},{t:"nine",h:"9",e:"9️⃣"}]},
  {w:"two",   c:"Numbers 🔢", ok:{t:"two",   h:"2",  e:"2️⃣"}, d:[{t:"three",h:"3",e:"3️⃣"},{t:"six",h:"6",e:"6️⃣"},{t:"eight",h:"8",e:"8️⃣"}]},
  {w:"three", c:"Numbers 🔢", ok:{t:"three", h:"3",  e:"3️⃣"}, d:[{t:"one",h:"1",e:"1️⃣"},{t:"four",h:"4",e:"4️⃣"},{t:"seven",h:"7",e:"7️⃣"}]},
  {w:"four",  c:"Numbers 🔢", ok:{t:"four",  h:"4",  e:"4️⃣"}, d:[{t:"two",h:"2",e:"2️⃣"},{t:"five",h:"5",e:"5️⃣"},{t:"ten",h:"10",e:"🔟"}]},
  {w:"five",  c:"Numbers 🔢", ok:{t:"five",  h:"5",  e:"5️⃣"}, d:[{t:"six",h:"6",e:"6️⃣"},{t:"three",h:"3",e:"3️⃣"},{t:"nine",h:"9",e:"9️⃣"}]},
  {w:"six",   c:"Numbers 🔢", ok:{t:"six",   h:"6",  e:"6️⃣"}, d:[{t:"seven",h:"7",e:"7️⃣"},{t:"one",h:"1",e:"1️⃣"},{t:"four",h:"4",e:"4️⃣"}]},
  {w:"seven", c:"Numbers 🔢", ok:{t:"seven", h:"7",  e:"7️⃣"}, d:[{t:"six",h:"6",e:"6️⃣"},{t:"eight",h:"8",e:"8️⃣"},{t:"two",h:"2",e:"2️⃣"}]},
  {w:"eight", c:"Numbers 🔢", ok:{t:"eight", h:"8",  e:"8️⃣"}, d:[{t:"nine",h:"9",e:"9️⃣"},{t:"five",h:"5",e:"5️⃣"},{t:"three",h:"3",e:"3️⃣"}]},
  {w:"nine",  c:"Numbers 🔢", ok:{t:"nine",  h:"9",  e:"9️⃣"}, d:[{t:"ten",h:"10",e:"🔟"},{t:"one",h:"1",e:"1️⃣"},{t:"six",h:"6",e:"6️⃣"}]},
  {w:"ten",   c:"Numbers 🔢", ok:{t:"ten",   h:"10", e:"🔟"},  d:[{t:"two",h:"2",e:"2️⃣"},{t:"eight",h:"8",e:"8️⃣"},{t:"four",h:"4",e:"4️⃣"}]},
  // COLORES
  {w:"red",        c:"Colors 🎨", ok:{t:"red",        h:"rojo",     e:"🔴"}, d:[{t:"blue",h:"azul",e:"🔵"},{t:"green",h:"verde",e:"🟢"},{t:"yellow",h:"amarillo",e:"🟡"}]},
  {w:"blue",       c:"Colors 🎨", ok:{t:"blue",       h:"azul",     e:"🔵"}, d:[{t:"red",h:"rojo",e:"🔴"},{t:"black",h:"negro",e:"⬛"},{t:"orange",h:"naranja",e:"🟠"}]},
  {w:"green",      c:"Colors 🎨", ok:{t:"green",      h:"verde",    e:"🟢"}, d:[{t:"blue",h:"azul",e:"🔵"},{t:"yellow",h:"amarillo",e:"🟡"},{t:"violet",h:"violeta",e:"🟣"}]},
  {w:"yellow",     c:"Colors 🎨", ok:{t:"yellow",     h:"amarillo", e:"🟡"}, d:[{t:"red",h:"rojo",e:"🔴"},{t:"orange",h:"naranja",e:"🟠"},{t:"white",h:"blanco",e:"⬜"}]},
  {w:"violet",     c:"Colors 🎨", ok:{t:"violet",     h:"violeta",  e:"🟣"}, d:[{t:"blue",h:"azul",e:"🔵"},{t:"red",h:"rojo",e:"🔴"},{t:"light blue",h:"celeste",e:"🩵"}]},
  {w:"orange",     c:"Colors 🎨", ok:{t:"orange",     h:"naranja",  e:"🟠"}, d:[{t:"yellow",h:"amarillo",e:"🟡"},{t:"red",h:"rojo",e:"🔴"},{t:"brown",h:"marrón",e:"🟤"}]},
  {w:"white",      c:"Colors 🎨", ok:{t:"white",      h:"blanco",   e:"⬜"}, d:[{t:"black",h:"negro",e:"⬛"},{t:"blue",h:"azul",e:"🔵"},{t:"yellow",h:"amarillo",e:"🟡"}]},
  {w:"brown",      c:"Colors 🎨", ok:{t:"brown",      h:"marrón",   e:"🟤"}, d:[{t:"orange",h:"naranja",e:"🟠"},{t:"black",h:"negro",e:"⬛"},{t:"red",h:"rojo",e:"🔴"}]},
  {w:"black",      c:"Colors 🎨", ok:{t:"black",      h:"negro",    e:"⬛"}, d:[{t:"white",h:"blanco",e:"⬜"},{t:"brown",h:"marrón",e:"🟤"},{t:"green",h:"verde",e:"🟢"}]},
  {w:"light blue", c:"Colors 🎨", ok:{t:"light blue", h:"celeste",  e:"🩵"}, d:[{t:"blue",h:"azul",e:"🔵"},{t:"violet",h:"violeta",e:"🟣"},{t:"green",h:"verde",e:"🟢"}]},
  // OBJETOS DEL AULA
  {w:"book",        c:"Classroom 📚", ok:{t:"book",        h:"libro",      e:"📚"}, d:[{t:"pencil",h:"lápiz",e:"✏️"},{t:"ruler",h:"regla",e:"📏"},{t:"eraser",h:"borrador",e:"🧼"}]},
  {w:"pencil case", c:"Classroom 📚", ok:{t:"pencil case", h:"cartuchera", e:"🗃️"}, d:[{t:"book",h:"libro",e:"📚"},{t:"crayon",h:"crayón",e:"🖍️"},{t:"ruler",h:"regla",e:"📏"}]},
  {w:"eraser",      c:"Classroom 📚", ok:{t:"eraser",      h:"borrador",   e:"🧼"}, d:[{t:"pencil",h:"lápiz",e:"✏️"},{t:"ruler",h:"regla",e:"📏"},{t:"pen",h:"lapicera",e:"🖊️"}]},
  {w:"ruler",       c:"Classroom 📚", ok:{t:"ruler",       h:"regla",      e:"📏"}, d:[{t:"book",h:"libro",e:"📚"},{t:"eraser",h:"borrador",e:"🧼"},{t:"pencil case",h:"cartuchera",e:"🗃️"}]},
  {w:"pen",         c:"Classroom 📚", ok:{t:"pen",         h:"lapicera",   e:"🖊️"}, d:[{t:"pencil",h:"lápiz",e:"✏️"},{t:"crayon",h:"crayón",e:"🖍️"},{t:"eraser",h:"borrador",e:"🧼"}]},
  {w:"crayon",      c:"Classroom 📚", ok:{t:"crayon",      h:"crayón",     e:"🖍️"}, d:[{t:"pencil",h:"lápiz",e:"✏️"},{t:"pen",h:"lapicera",e:"🖊️"},{t:"book",h:"libro",e:"📚"}]},
  {w:"pencil",      c:"Classroom 📚", ok:{t:"pencil",      h:"lápiz",      e:"✏️"}, d:[{t:"pen",h:"lapicera",e:"🖊️"},{t:"crayon",h:"crayón",e:"🖍️"},{t:"ruler",h:"regla",e:"📏"}]},
];
const TOTAL = 10; // 10 preguntas por ronda

/* ─── ESTADO ──────────────────────────────────────── */
let round=0, score=0, hits=0, qs=[], answered=false;

/* ─── REFS ────────────────────────────────────────── */
const $=id=>document.getElementById(id);
const scoreEl=$('scoreEl'),roundEl=$('roundEl'),hitsEl=$('hitsEl');
const catBadge=$('catBadge'),optsGrid=$('optsGrid');
const feedbackEl=$('feedbackEl'),btnNext=$('btnNext');
const btnListen=$('btnListen'),btnRep=$('btnRep'),wavesEl=$('wavesEl');
const starTrack=$('starTrack');
const mascot=$('mascot'),bubble=$('bubble'),eyeL=$('eyeL'),eyeR=$('eyeR');
const gameCard=$('gameCard'),endScreen=$('endScreen');

/* ─── FONDO CON ESTRELLAS ─────────────────────────── */
(()=>{
  const bg=$('bgEl');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');s.className='star-bg';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    bg.appendChild(s);
  }
})();

/* ─── TRACK ESTRELLAS ─────────────────────────────── */
function buildTrack(){
  starTrack.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const s=document.createElement('span');
    s.className='s-dot';s.textContent='⭐';s.id='sd'+i;
    starTrack.appendChild(s);
  }
}

/* ─── VOZ MASCULINA BRITÁNICA ─────────────────────── */
function getBritVoice(){
  const vs=speechSynthesis.getVoices();
  for(const n of['Daniel','Google UK English Male','Arthur']){
    const v=vs.find(v=>v.name.includes(n));if(v)return v;
  }
  return vs.find(v=>v.lang==='en-GB')||vs.find(v=>v.lang.startsWith('en'))||null;
}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
if(speechSynthesis.getVoices().length)speechSynthesis.getVoices();

function speak(txt){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-GB';u.rate=0.82;u.pitch=0.95;
  const v=getBritVoice();if(v)u.voice=v;
  btnListen.classList.add('playing');
  wavesEl.classList.add('active');
  u.onend=()=>{btnListen.classList.remove('playing');wavesEl.classList.remove('active');};
  speechSynthesis.speak(u);
}

/* ─── SONIDOS ─────────────────────────────────────── */
function tone(f,d,type='sine',vol=.3){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start();o.stop(ctx.currentTime+d);
  }catch(e){}
}
function sndOk(){tone(523,.12);setTimeout(()=>tone(659,.12),130);setTimeout(()=>tone(784,.28),260);}
function sndKo(){tone(330,.15,'sawtooth',.2);setTimeout(()=>tone(220,.28,'sawtooth',.2),160);}

/* ─── CONFETTI ───────────────────────────────────── */
const CF=['#ff6fd8','#ffd700','#00c851','#4ecdc4','#ff6b6b','#a18cd1','#f7971e','#fff'];
function confetti(){
  for(let i=0;i<70;i++){
    const p=document.createElement('div');p.className='confetti-p';
    const w=Math.random()*10+6,h=Math.random()*10+6;
    p.style.cssText=`
      left:${Math.random()*100}vw;top:-12px;
      width:${w}px;height:${h}px;
      background:${CF[Math.floor(Math.random()*CF.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      --d:${(Math.random()*1.8+1).toFixed(2)}s;
      animation-delay:${(Math.random()*.5).toFixed(2)}s;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3500);
  }
}

/* ─── MASCOTA ─────────────────────────────────────── */
let owlTimer;
function owlSay(msg,state=''){
  mascot.className='mascot-wrap'+(state?' '+state:'');
  eyeL.className='o-eye'+(state==='correct'?' happy':state==='wrong'?' sad':'');
  eyeR.className='o-eye'+(state==='correct'?' happy':state==='wrong'?' sad':'');
  bubble.textContent=msg;
  bubble.classList.add('show');
  clearTimeout(owlTimer);
  owlTimer=setTimeout(()=>bubble.classList.remove('show'),2400);
}

/* ─── UTILIDADES ──────────────────────────────────── */
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

/* ─── HUD ─────────────────────────────────────────── */
function updateHUD(){
  scoreEl.textContent=score;
  roundEl.textContent=round+1;
  hitsEl.textContent=hits;
  if(round>0){const prev=$('sd'+(round-1));if(prev)prev.classList.add('done');}
}

/* ─── CARGAR PREGUNTA ─────────────────────────────── */
function loadQ(){
  answered=false;
  feedbackEl.className='feedback';feedbackEl.textContent='';
  btnNext.classList.remove('show');

  const q=qs[round];
  catBadge.textContent=q.c;

  const opts=shuffle([
    {t:q.ok.t,h:q.ok.h,e:q.ok.e,isOk:true},
    ...q.d.map(x=>({t:x.t,h:x.h,e:x.e,isOk:false}))
  ]);

  optsGrid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="opt-e">${o.e}</span><span class="opt-en">${o.t}</span><span class="opt-es">${o.h}</span>`;
    b.dataset.k=o.t;
    b.addEventListener('click',()=>answer(b,o.isOk,q));
    optsGrid.appendChild(b);
  });

  updateHUD();
  setTimeout(()=>speak(q.w),650);
  owlSay('Listen carefully! 👂');
}

/* ─── RESPONDER ───────────────────────────────────── */
const OK_MSGS=['⭐ Excellent!','🎉 Amazing!','🌟 Brilliant!','👏 Well done!','🥳 Superb!','💫 Perfect!'];

function answer(btn,isOk,q){
  if(answered)return;
  answered=true;
  optsGrid.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  if(isOk){
    btn.classList.add('correct');
    score+=10;hits++;
    sndOk();confetti();
    feedbackEl.textContent=OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)];
    feedbackEl.className='feedback show ok';
    owlSay('Woohoo! 🎉','correct');
    speak('Excellent!');
  } else {
    btn.classList.add('wrong');
    sndKo();
    feedbackEl.textContent=`❌ It was: "${q.ok.t}" ${q.ok.e}`;
    feedbackEl.className='feedback show ko';
    optsGrid.querySelectorAll('.opt').forEach(b=>{if(b.dataset.k===q.ok.t)b.classList.add('correct');});
    owlSay('Oops! Try again! 💪','wrong');
    speak('Try again next time!');
  }
  updateHUD();
  btnNext.classList.add('show');
}

/* ─── SIGUIENTE ───────────────────────────────────── */
function nextRound(){
  round++;
  if(round>=TOTAL) endGame();
  else loadQ();
}

/* ─── FIN ─────────────────────────────────────────── */
function endGame(){
  const last=$('sd'+(TOTAL-1));if(last)last.classList.add('done');
  gameCard.style.display='none';
  endScreen.classList.add('show');
  const pct=hits/TOTAL;
  let trophy,title,stars;
  if(pct>=.9){trophy='🏆';title="You're a STAR! 🌟";stars='⭐⭐⭐';}
  else if(pct>=.6){trophy='🥈';title='Great job! 😊';stars='⭐⭐';}
  else {trophy='🎮';title='Keep practising! 💪';stars='⭐';}
  $('endTrophy').textContent=trophy;
  $('endTitle').textContent=title;
  $('endStars').textContent=stars;
  $('endSc').textContent=`You got ${hits} out of ${TOTAL} correct!`;
  if(pct>=.6){confetti();setTimeout(confetti,700);}
  setTimeout(()=>speak(pct>=.6?'Amazing job! You are a star!':'Good try! Practice makes perfect!'),500);
}

/* ─── REINICIAR ───────────────────────────────────── */
// Pool que se va rotando — garantiza que en cada partida
// aparezcan palabras distintas a la sesión anterior
let _pool = [];
function pickNext10(){
  // Si el pool está vacío o tiene menos de 10, recargamos con todo barajado
  if(_pool.length < TOTAL) _pool = shuffle(Q);
  const batch = _pool.splice(0, TOTAL); // sacar las primeras 10
  return batch;
}

function reset(){
  round=0;score=0;hits=0;
  qs=pickNext10();
  endScreen.classList.remove('show');
  gameCard.style.display='';
  buildTrack();
  owlSay("Ready? Let's go! 🚀");
  loadQ();
}

/* ─── EVENTOS ─────────────────────────────────────── */
btnListen.addEventListener('click',()=>speak(qs[round].w));
btnRep.addEventListener('click',()=>speak(qs[round].w));
btnNext.addEventListener('click',nextRound);
$('btnAgain').addEventListener('click',reset);

/* ─── INICIO ──────────────────────────────────────── */
reset();
</script>
